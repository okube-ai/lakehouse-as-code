name: account
organization: Okube
description: Databricks Account
backend: terraform
terraform:
  backend:
    azurerm:
      resource_group_name: o3-rg-lakehouse-prd
      storage_account_name: o3stglakehouseprd
      container_name: terraform
      key: "states/account/terraform.tfstate"
      use_azuread_auth: true
      client_id: ${vars.AZURE_CLIENT_ID}
      client_secret: ${vars.AZURE_CLIENT_SECRET}
      tenant_id: ${vars.AZURE_TENANT_ID}
      subscription_id: c8b10a15-5bb2-4c3f-988a-8ec6e60614bb

resources:

  providers:
    databricks:
      host: https://accounts.azuredatabricks.net
      account_id: ${vars.DATABRICKS_ACCOUNT_ID}
      azure_client_id: ${vars.AZURE_CLIENT_ID}
      azure_client_secret: ${vars.AZURE_CLIENT_SECRET}
      azure_tenant_id: ${vars.AZURE_TENANT_ID}
      auth_type: azure-client-secret

  # Account Groups
  databricks_groups: !use resources/groups.yaml

  # Account Users
  databricks_users: !use resources/users.yaml

  # Service Principals
  databricks_serviceprincipals: !use resources/serviceprincipals.yaml

#  # Metastore
##  databricks_metastores:
##    metastore-lakehouse: !use resources/metastore.yaml
