name: metastore-lakehouse
storage_root: ${vars.metastore_storage_location_dev}  # defaulting to dev storage account, but could be metastore-specific storage account
region: eastus
force_destroy: True
owner: role-metastore-admins
delta_sharing_scope: INTERNAL_AND_EXTERNAL
delta_sharing_recipient_token_lifetime_in_seconds: 86400
delta_sharing_organization_name: okube
workspace_assignments:
  - workspace_id: ${vars.workspace_id_dev}
  - workspace_id: ${vars.workspace_id_prd}
grants_provider: ${resources.databricks.workspace}
grants:
  - principal: role-metastore-admins
    privileges:
      - CREATE_CATALOG
      - CREATE_CONNECTION
      - CREATE_EXTERNAL_LOCATION
      - CREATE_EXTERNAL_METADATA
      - CREATE_SERVICE_CREDENTIAL
      - CREATE_STORAGE_CREDENTIAL
      - MANAGE_ALLOWLIST
      - USE_CONNECTION
options:
  depends_on:
    - ${resources.group-role-metastore-admins}