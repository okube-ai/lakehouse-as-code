name: pl-taxi-trips

dependencies:
  - ${var.laktory_package}
  - ${var.workflows_package}

orchestrator:
  type: DATABRICKS_PIPELINE
  catalog: ${var.catalog}
  schema: nyctaxi
  serverless: true

# --------------------------------------------------------------------------- #
# Nodes                                                                       #
# --------------------------------------------------------------------------- #

nodes:

  - name: sample_trips
    source:
      table_name: samples.nyctaxi.trips
    sinks:
    - table_name: sample_trips

  - name: sample_zones
    source:
      node_name: sample_trips
    sinks:
    - table_name: sample_zones
    transformer:
      nodes:
      - func_name: workflows.get_sample_zones
