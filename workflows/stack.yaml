name: workflows
organization: okube
description: Lakehouse - Workspace
backend: terraform
terraform:
  backend: !use terraform-config/backend.yaml

resources:
  providers:
    databricks:
      host: ${vars.databricks_host}
      azure_client_id: ${vars.AZURE_CLIENT_ID}
      azure_client_secret: ${vars.AZURE_CLIENT_SECRET}
      azure_tenant_id: ${vars.AZURE_TENANT_ID}
      auth_type: azure-client-secret

  # TODO: Disable
#  databricks_apps:
#    app-stocks-dash: !use resources/app-stocks-dash.yaml
  databricks_workspacetrees: !use resources/workspacetrees.yaml
  databricks_queries: !use resources/queries.yaml
  databricks_pythonpackages: !use resources/pythonpackages.yaml
  pipelines:
    pl-taxi-trips: !use resources/pl-taxi-trips.yaml
    pl-stock-prices: !use resources/pl-stock-prices.yaml
  databricks_jobs:
    job-stock-prices: !use resources/job-stock-prices.yaml
variables:
  laktory_package: laktory==0.11.5
#  laktory_package: git+https://github.com/okube-ai/laktory.git@feat/release
  lake_package: /Workspace${vars.workspace_root}wheels/lake-0.0.1-py3-none-any.whl

environments:
  dev:
    variables:
      catalog: o3_dev
      databricks_host: adb-4623853922539974.14.azuredatabricks.net
      env: dev
      is_dev: true
      pause_status: PAUSED
      sql_tasks_warehouse_id: d377b553e7fd51eb
  prd:
    variables:
      catalog: o3_prd
      databricks_host: adb-1985337240298151.11.azuredatabricks.net
      env: prd
      is_dev: false
      pause_status: PAUSED
      sql_tasks_warehouse_id: d52b34f891651b2f
