name: workflows
organization: okube
description: Lakehouse - Workflows
backend: pulumi
pulumi:
  config:
    databricks:host: ${vars.DATABRICKS_HOST}
    databricks:azureClientId: ${vars.AZURE_CLIENT_ID}
    databricks:azureClientSecret: ${vars.AZURE_CLIENT_SECRET}
    databricks:azureTenantId: ${vars.AZURE_TENANT_ID}
    databricks:authType: azure-client-secret
resources:
  databricks_apps:
    app-stocks-dash: !use resources/app-stocks-dash.yaml
  databricks_workspacetrees: !use resources/workspacetrees.yaml
  databricks_queries: !use resources/queries.yaml
  databricks_pythonpackages: !use resources/pythonpackages.yaml
  pipelines:
    pl-taxi-trips: !use resources/pl-taxi-trips.yaml
    pl-stock-prices: !use resources/pl-stock-prices.yaml
  databricks_jobs:
    job-stock-prices: !use resources/job-stock-prices.yaml
variables:
#  laktory_package: laktory==0.9.1
  laktory_package: git+https://github.com/okube-ai/laktory.git@main
  lake_package: /Workspace${vars.workspace_laktory_root}wheels/lake-0.0.1-py3-none-any.whl

environments:
  dev:
    variables:
      catalog: dev
      is_dev: true
      sql_tasks_warehouse_id: 4d0b09d503ba808f
      pause_status: PAUSED
  prd:
    variables:
      catalog: prd
      is_dev: false
      sql_tasks_warehouse_id: 5beb0035099473f4
      pause_status: PAUSED
