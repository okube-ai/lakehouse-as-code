name: pl-taxi-trips

dependencies:
  - ${var.laktory_package}
  - ${var.workflows_package}

orchestrator:
  type: DATABRICKS_PIPELINE
  catalog: ${var.catalog}
  schema: nyctaxi
  serverless: true

# --------------------------------------------------------------------------- #
# Nodes                                                                       #
# --------------------------------------------------------------------------- #

nodes:

  - name: sample_trips
    source:
      table_name: samples.nyctaxi.trips
    sinks:
    - table_name: sample_trips
    transformer:
      dataframe_api: NATIVE
      nodes:
      - func_name: withColumn
        func_args:
        - duration
        - F.col("tpep_dropoff_datetime") - F.col("tpep_pickup_datetime")

  - name: sample_zones
    source:
      node_name: sample_trips
    sinks:
    - table_name: sample_zones
    transformer:
      nodes:
      - func_name: lake.get_sample_zones

  - name: short_trips
    source:
      node_name: sample_trips
    sinks:
    - table_name: short_trips
    transformer:
      nodes:
      - expr: SELECT * FROM {df} WHERE trip_distance < 1
