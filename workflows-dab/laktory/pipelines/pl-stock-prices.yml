name: pl-stock-prices

dependencies:
  - ${var.laktory_package}
  - ${var.lake_package}

dataframe_api: NATIVE

orchestrator:
  type: DATABRICKS_PIPELINE
  serverless: true
  catalog: ${var.catalog}
  schema: market_dab
  resource_options:
    name: pl-stock-prices

# --------------------------------------------------------------------------- #
# Nodes                                                                       #
# --------------------------------------------------------------------------- #

nodes:

  # ------------------------------------------------------------------------- #
  # Stock Prices                                                              #
  # ------------------------------------------------------------------------- #

  - name: brz_stock_prices
    sources:
    - path: /Volumes/${var.catalog}/sources/landing/events/yahoo-finance/stock_price/
      as_stream: true
      format: JSON
      reader_kwargs:
        cloudFiles.inferColumnTypes: true
    sinks:
    - table_name: brz_stock_prices
      schema_name: yahoo_dab

  - name: slv_stock_prices
    expectations:
      - name: positive_price
        expr: open > 0
        action: QUARANTINE
      - name: recent_price
        expr: created_at > '2023-01-01'
        action: DROP
    sources:
    - node_name: brz_stock_prices
      as_stream: true
    sinks:
    - table_name: slv_stock_prices
      schema_name: yahoo_dab
    - table_name: slv_stock_prices_quarantine
      schema_name: yahoo_dab
      is_quarantine: True
    transformer:
      nodes:
        - expr: |
            SELECT
              data.created_at AS created_at,
              data.symbol AS symbol,
              data.open AS open,
              data.close AS close,
              data.high AS high,
              data.low AS low,
              data.volume AS volume
            FROM
              {df}
        - func_name: drop_duplicates
          func_kwargs:
            subset:
              - symbol
              - created_at

  # ------------------------------------------------------------------------- #
  # Stock Metadata                                                            #
  # ------------------------------------------------------------------------- #

  - name: brz_stock_metadata
    sources:
    - path: /Volumes/${var.catalog}/sources/landing/events/yahoo-finance/stock_metadata/
      as_stream: true
      format: JSON
      reader_kwargs:
        cloudFiles.inferColumnTypes: true
    sinks:
    - schema_name: yahoo_dab
      table_name: brz_stock_metadata
    transformer:
      nodes:
        - func_name: withColumn
          func_args:
            - _filepath
            - F.expr("_metadata.file_path")
        - func_name: withColumn
          func_args:
            - _extracted_at
            - F.expr("_metadata.file_modification_time")

  - name: slv_stock_metadata
    sources:
    - node_name: brz_stock_metadata
      as_stream: true
    sinks:
    - table_name: slv_stock_metadata
      mode: MERGE
      merge_cdc_options:
        order_by: extracted_at
        primary_keys:
          - symbol
        scd_type: 1
    transformer:
      nodes:
        - func_name: select
          func_args:
            - F.col("_extracted_at").alias("extracted_at")
            - F.col("data.symbol").cast(T.StringType()).alias("symbol")
            - F.col("data.currency").cast(T.StringType()).alias("currency")
            - F.col("data.firstTradeDate").cast(T.StringType()).alias("first_traded")

  # ------------------------------------------------------------------------- #
  # Silver Joins                                                              #
  # ------------------------------------------------------------------------- #

  - name: slv_stocks
    sources:
    - node_name: slv_stock_prices
      as_stream: false
    - name: metadata
      node_name: slv_stock_metadata
      selects:
        - symbol
        - currency
        - first_traded
    sinks:
    - table_name: slv_stocks
      schema_name: market_dab
    transformer:
      nodes:
        - func_name: join
          func_kwargs:
            other: "{sources.metadata}"
            "on":
              - symbol

  # ------------------------------------------------------------------------- #
  # Gold                                                                      #
  # ------------------------------------------------------------------------- #

  - name: gld_stock_prices_by_1d
    sources:
    - node_name: slv_stocks
      as_stream: false
    sinks:
    - table_name: gld_stock_prices_by_1d
      metadata:
        comment: Stock prices aggregated daily
        tags:
          env: dev
          pii: "false"
        columns:
          - name: day_id
            comment: Day unique id
            tags:
              pii: "false"
    transformer:
      dataframe_api: NARWHALS
      nodes:
        - func_name: with_columns
          func_kwargs:
            day_id: nw.col("created_at").dt.truncate("1d")
        - func_name: laktory.groupby_and_agg
          func_kwargs:
            groupby_columns:
              - symbol
              - day_id
            agg_expressions:
              - expr: nw.col('symbol').count().alias("count")
              - expr: nw.col('low').min().alias("low")
              - expr: nw.col('high').max().alias("high")
              - expr: nw.col('open').min().alias("open")
              - expr: nw.col('close').max().alias("close")
