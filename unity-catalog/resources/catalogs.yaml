catalog-o3:
  name: o3_${vars.env}
  storage_root: ${resources.external-location-managed.url}
  isolation_mode: ${{'ISOLATED' if vars.env == 'prd' else 'OPEN' }}
  grants:
    - principal: account users
      privileges:
        - USE_CATALOG
        - USE_SCHEMA
    - principal: role-metastore-admins
      privileges:
        - ALL_PRIVILEGES
        - MANAGE
  schemas:
    - !extend schemas.yaml
    - name: sources
      volumes:
        - name: landing
          volume_type: EXTERNAL
          storage_location: ${resources.external-location-landing.url}
          grants:
            - principal: account users
              privileges:
                - READ_VOLUME
            - principal: role-metastore-admins
              privileges:
                - WRITE_VOLUME
    - name: sinks
      volumes:
        - name: tables
          volume_type: EXTERNAL
          storage_location: ${resources.external-location-external.url}
          grants:
            - principal: account users
              privileges:
                - READ_VOLUME
            - principal: role-metastore-admins
              privileges:
                - WRITE_VOLUME

# --------------------------------------------------------------------------- #
# sandbox                                                                     #
# --------------------------------------------------------------------------- #

catalog-sandbox:
  name: sandbox
  isolation_mode: OPEN
  grants:
    - principal: account users
      privileges:
        - USE_CATALOG
        - USE_SCHEMA
        - SELECT
        - MODIFY
        - CREATE_FUNCTION
        - CREATE_MATERIALIZED_VIEW
        - CREATE_MODEL
        - CREATE_SCHEMA
        - CREATE_TABLE
        - READ_VOLUME
        - CREATE_VOLUME
    - principal: role-metastore-admins
      privileges:
        - ALL_PRIVILEGES
        - MANAGE
  schemas:
    - name: default
  options:
    is_enabled: ${{vars.env == 'prd'}}

# --------------------------------------------------------------------------- #
# libraries                                                                   #
# --------------------------------------------------------------------------- #

catalog-libraries:
  name: libraries
  isolation_mode: OPEN
  grants:
    - principal: account users
      privileges:
        - USE_CATALOG
        - USE_SCHEMA
        - READ_VOLUME
    - principal: role-metastore-admins
      privileges:
        - WRITE_VOLUME
  schemas:
    - name: default
      volumes:
        - name: init_scripts
  options:
    is_enabled: ${{vars.env == 'prd'}}