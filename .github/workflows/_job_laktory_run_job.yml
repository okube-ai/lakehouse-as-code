name: laktory run job

on:
  workflow_call:
    inputs:
      env:
        type: string
        required: true
      working-directory:
        type: string
        required: false
        default: ./workspace
      job_name:
        type: string
        required: true
      timeout:
        type: string
        description: Maximum allowed time (in seconds) for run.
        required: false
        default: 1200
      raise_exception:
        type: boolean
        description: Raise exception on failure
        required: false
        default: true
      current_run_action:
        type: string
        description: Action to take for currently running job or pipline
        required: false
        default: WAIT
      laktory_branch:
        type: string
        required: false
        default: ''
    secrets:
      azure_client_id:
        required: False
      azure_client_secret:
        required: False
      azure_tenant_id:
        required: False
      databricks_account_id:
        required: False

# TODO: Figure out a way not to have to explicitly define each possible
# environment variable
env:
#  ARM_CLIENT_ID: ${{ secrets.azure_client_id }}
#  ARM_CLIENT_SECRET: ${{ secrets.azure_client_secret }}
#  ARM_TENANT_ID: ${{ secrets.azure_tenant_id }}
#  DATABRICKS_AUTH_TYPE: azure-client-secret
#  DATABRICKS_HOST: ${{ inputs.databricks_host }}
##  DATABRICKS_ACCOUNT_ID: ${{ secrets.databricks_account_id }}
  AZURE_CLIENT_ID: ${{ secrets.azure_client_id }}
  AZURE_CLIENT_SECRET: ${{ secrets.azure_client_secret }}
  AZURE_TENANT_ID: ${{ secrets.azure_tenant_id }}
  DATABRICKS_ACCOUNT_ID: ${{ secrets.databricks_account_id }}
  LAKTORY_CLI_RAISE_EXTERNAL_EXCEPTIONS: true

jobs:
  laktory-run-job:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.14"
          python-version: 3.12

      - name: env vars
        run: |
          import os
          for k, v in os.environ.items():
            print(k, "|", v)
        shell: python

      - name: Override laktory version
        if: ${{ inputs.laktory_branch != '' }}
        run: |
          sed -i "s|^laktory.*|git+https://github.com/okube-ai/laktory.git@${{ inputs.laktory_branch }}|" requirements.txt
        working-directory: ${{ inputs.working-directory }}

      - name: Setup python environment
        run: |
          uv pip install -r requirements.txt
        working-directory: ${{ inputs.working-directory }}

      - name: laktory run
        run: |
          laktory run -e ${{ inputs.env }} --dbks-job ${{ inputs.job_name }} -a ${{ inputs.current_run_action }} -t ${{ inputs.timeout }}
        working-directory: ${{ inputs.working-directory }}

